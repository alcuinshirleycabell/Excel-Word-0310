name: Build Windows EXE

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（可选）'
        required: false
        default: ''

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          pip install python-docx pandas openpyxl pyinstaller

      - name: Build
        shell: cmd
        run: |
          pyinstaller --noconfirm --onefile --windowed --name ExcelToWord batch_word_gen.py

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ExcelToWord-EXE
          path: dist/ExcelToWord.exe
